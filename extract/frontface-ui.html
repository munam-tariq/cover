<style id="ff-overrides">
/* ============================================================
   Prototype overrides — sit on top of the app's real compiled CSS.
   Everything here is either (a) base font wiring the static file needs
   because we don't use next/font, or (b) chrome for the prototype shell
   (modals, toasts, section launcher) that isn't part of the product.
   ============================================================ */

:root {
  --font-mono: "JetBrains Mono";
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
    Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
  min-height: 100vh;
  margin: 0;
}

/* Arabic text tuning when the whole doc flips to RTL */
html[dir="rtl"] body {
  font-family: "IBM Plex Sans Arabic", "Inter", -apple-system, "Segoe UI",
    Tahoma, sans-serif;
}

/* The app renders inside #app; keep it full-height so dashboard fills screen */
#app { min-height: 100vh; }

/* ---- View transition (subtle fade on route change) ---- */
@keyframes proto-fade { from { opacity: 0; } to { opacity: 1; } }
.proto-fade { animation: proto-fade .18s ease both; }

/* ---- Modal / dialog (shadcn dialog look, re-implemented) ---- */
.proto-modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  animation: proto-fade .15s ease both;
}
.proto-modal-panel {
  background: hsl(var(--card)); color: hsl(var(--card-foreground));
  border-radius: var(--radius);
  box-shadow: 0 20px 50px -12px rgba(0,0,0,.35);
  width: 100%; max-height: 90vh; overflow-y: auto;
  animation: proto-pop .18s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes proto-pop { from { opacity:0; transform: translateY(6px) scale(.985);} to { opacity:1; transform:none; } }

/* ---- Toasts ---- */
#toast-root {
  position: fixed; z-index: 200; bottom: 1rem; inset-inline-end: 1rem;
  display: flex; flex-direction: column; gap: .5rem; pointer-events: none;
}
.proto-toast {
  pointer-events: auto;
  background: hsl(var(--foreground)); color: hsl(var(--background));

function openModal(inner, opts) {
  opts = opts || {};
  const root = byId("modal-root");
  const maxw = opts.width || "max-w-lg";
  root.innerHTML = `<div class="proto-modal-backdrop" data-modal-backdrop>
    <div class="proto-modal-panel ${maxw}" role="dialog" aria-modal="true">${inner}</div>
  </div>`;
  root.querySelector("[data-modal-backdrop]").addEventListener("mousedown", (e) => {
    if (e.target === e.currentTarget) closeModal();
  });
  if (opts.onMount) opts.onMount(root.querySelector(".proto-modal-panel"));
}
function closeModal() { byId("modal-root").innerHTML = ""; }
window.closeModal = closeModal;

let toastTimer = null;
function toast(msg, ico) {
  const root = byId("toast-root");
  const node = document.createElement("div");
  node.className = "proto-toast";
  node.innerHTML = `${ico ? icon(ico, "w-4 h-4") : ""}<span>${esc(msg)}</span>`;
  root.appendChild(node);
  setTimeout(() => { node.style.opacity = "0"; node.style.transition = "opacity .3s"; }, 2600);
  setTimeout(() => node.remove(), 3000);
}
window.toast = toast;

function avatarInitials(name) {
  return name.split(" ").map((w) => w[0]).slice(0, 2).join("").toUpperCase();

function statusDot(status) {
  const c = status === "online" ? "bg-green-500" : status === "away" ? "bg-yellow-500" : "bg-gray-400";
  return `<span class="w-2 h-2 rounded-full ${c}"></span>`;
}
// small colored avatar chip
function avatar(name, extra) {
  const colors = ["bg-blue-100 text-blue-700", "bg-emerald-100 text-emerald-700", "bg-violet-100 text-violet-700", "bg-amber-100 text-amber-700", "bg-rose-100 text-rose-700", "bg-cyan-100 text-cyan-700"];
  let hash = 0; for (const ch of name) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
  const c = colors[hash % colors.length];
  return `<span class="inline-flex items-center justify-center rounded-full ${c} font-medium ${extra || "h-8 w-8 text-xs"}">${esc(avatarInitials(name))}</span>`;
}
function badge(text, tone) {
  const tones = {
    default: "bg-primary text-primary-foreground",
    secondary: "bg-secondary text-secondary-foreground",
    outline: "border text-foreground",
    green: "bg-green-100 text-green-700",
    red: "bg-red-100 text-red-700",
    amber: "bg-amber-100 text-amber-700",
    blue: "bg-blue-100 text-blue-700",
    gray: "bg-muted text-muted-foreground",
    violet: "bg-violet-100 text-violet-700",
  };
  return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${tones[tone] || tones.default}">${esc(text)}</span>`;
}
function pageHeader(title, desc, actions) {

}
function btn(label, opts) {
  opts = opts || {};
  const variants = {
    primary: "bg-primary text-primary-foreground hover:opacity-90",
    outline: "border bg-background hover:bg-muted",
    ghost: "hover:bg-muted",
    destructive: "bg-destructive text-destructive-foreground hover:opacity-90",
  };
  const sizes = { sm: "h-8 px-3 text-xs", md: "h-9 px-4 text-sm", lg: "h-10 px-5 text-sm" };

/* ============================ charts (SVG, no deps) ============================ */
function lineChart(series, opts) {
  opts = opts || {}; const W = 720, H = 220, pad = 30;
  const n = series[0].values.length;
  const max = Math.max(1, ...series.flatMap((s) => s.values)) * 1.18;
  const X = (i) => pad + (i / (n - 1)) * (W - pad * 2);
  const Y = (v) => H - pad - (v / max) * (H - pad * 2);
  const grid = [0, 0.25, 0.5, 0.75, 1].map((f) => `<line x1="${pad}" x2="${W - pad}" y1="${pad + f * (H - pad * 2)}" y2="${pad + f * (H - pad * 2)}" stroke="hsl(var(--border))" stroke-width="1"/>`).join("");
  const paths = series.map((s, si) => {
    const d = s.values.map((v, i) => `${i === 0 ? "M" : "L"}${X(i).toFixed(1)} ${Y(v).toFixed(1)}`).join(" ");
    const area = si === 0 ? `<path d="${d} L${X(n - 1)} ${H - pad} L${X(0)} ${H - pad} Z" fill="${s.color}" opacity="0.08"/>` : "";
    return `${area}<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  }).join("");
  const dots = series.map((s) => s.values.map((v, i) => `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.5" fill="${s.color}"/>`).join("")).join("");
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:220px">${grid}${paths}${dots}</svg>`;
}

/* lightweight anchored menu (dropdown) */
function openMenu(anchor, inner, widthCls) {
  closeMenu();
  const menu = document.createElement("div");
  menu.id = "proto-menu";
  menu.className = `${widthCls || "w-56"} bg-card border rounded-md shadow-lg py-1 z-50`;
  menu.style.position = "fixed";
  menu.innerHTML = inner;
  document.body.appendChild(menu);
  const r = anchor.getBoundingClientRect();
  const mw = menu.offsetWidth;
  menu.style.top = r.bottom + 6 + "px";
  let left = r.right - mw;
  if (left < 8) left = r.left;
  menu.style.left = Math.max(8, left) + "px";
  setTimeout(() => document.addEventListener("mousedown", outsideMenu), 0);
}
function outsideMenu(e) { const m = byId("proto-menu"); if (m && !m.contains(e.target)) closeMenu(); }
function closeMenu() { const m = byId("proto-menu"); if (m) m.remove(); document.removeEventListener("mousedown", outsideMenu); }
window.openMenu = openMenu; window.closeMenu = closeMenu;

/* --------- global event delegation --------- */
document.addEventListener("click", (e) => {
  const navEl = e.target.closest("[data-nav]");
  if (navEl) { e.preventDefault(); closeMenu(); location.hash = "#" + navEl.getAttribute("data-nav"); return; }
  const actEl = e.target.closest("[data-action]");
  if (actEl) {
    const raw = actEl.getAttribute("data-action");
    const [name, arg] = raw.split(":");
    if (ACTIONS[name]) { e.preventDefault(); ACTIONS[name](arg !== undefined ? arg : actEl, e); }
  }
});
document.addEventListener("submit", (e) => {
  const f = e.target.closest("[data-submit]");
  if (f) { e.preventDefault(); const name = f.getAttribute("data-submit"); if (SUBMITS[name]) SUBMITS[name](f, e); }
});
document.addEventListener("input", (e) => {
  const el = e.target.closest("[data-input]");
  if (el) { const [name, arg] = el.getAttribute("data-input").split(":"); if (INPUTS[name]) INPUTS[name](el.value, el, arg); }
});
document.addEventListener("change", (e) => {
  const el = e.target.closest("[data-change]");
  if (el) { const [name, arg] = el.getAttribute("data-change").split(":"); if (INPUTS[name]) INPUTS[name](el.value, el, arg); }
});

      <button class="proto-launch__item" data-nav="/m/home">${icon("globe", "w-4 h-4")} Landing page</button>
      <button class="proto-launch__item" data-nav="/m/features">${icon("sparkles", "w-4 h-4")} Features</button>
      <button class="proto-launch__item" data-nav="/m/blog">${icon("file", "w-4 h-4")} Blog</button>
      <button class="proto-launch__item" data-nav="/m/tools">${icon("zap", "w-4 h-4")} Tools</button>
      <div class="proto-launch__title">Flow</div>
      <button class="proto-launch__item" data-nav="/login">${icon("log-out", "w-4 h-4")} Sign in</button>
      <button class="proto-launch__item" data-action="viewOnboarding">${icon("play", "w-4 h-4")} Onboarding <small>guided</small></button>
      <div class="proto-launch__title">Product</div>
      <button class="proto-launch__item" data-nav="/d/dashboard">${icon("home", "w-4 h-4")} Dashboard</button>
      <button class="proto-launch__item" data-nav="/d/inbox">${icon("inbox", "w-4 h-4")} Inbox</button>
      <button class="proto-launch__item" data-nav="/d/analytics">${icon("bar-chart", "w-4 h-4")} Analytics</button>
    </div>`;
  document.body.appendChild(wrap);
  const btnEl = wrap.querySelector("#proto-launch-btn");
  const menu = wrap.querySelector("#proto-launch-menu");
  btnEl.addEventListener("click", (e) => { e.stopPropagation(); menu.hidden = !menu.hidden; });
  document.addEventListener("click", (e) => { if (!wrap.contains(e.target)) menu.hidden = true; });
  menu.addEventListener("click", () => { menu.hidden = true; });
}
function windowMarkWhite() { return `<span style="display:inline-flex;color:#fff">${windowMark(16)}</span>`; }

/* ------------------------------- render ------------------------------- */
function parseHash() {
  let h = location.hash.replace(/^#\/?/, "");
  if (!h) h = "m/home";
  const parts = h.split("/");
  return { path: h, parts };
}
function resolve(path, parts) {
  if (ROUTES[path]) return ROUTES[path]();
  // pattern routes: try progressively (e.g. d/inbox/:id, m/blog/:slug)
  for (let i = parts.length; i > 0; i--) {
    const base = parts.slice(0, i - 1).join("/") + "/:";
    // handled by explicit param routes registered as `${base}param`
  }
  // param routes registered as functions on ROUTES with key ending in "/*"
  const wildKey = parts.slice(0, -1).join("/") + "/*";
  if (ROUTES[wildKey]) return ROUTES[wildKey](parts[parts.length - 1], parts);
  return ROUTES["m/home"] ? ROUTES["m/home"]() : `<p style="padding:40px">Not found: ${esc(path)}</p>`;
}
function render() {
  closeMenu(); closeModal();
  const { path, parts } = parseHash();
  const app = byId("app");
  app.innerHTML = resolve(path, parts);
  const isMarketingOrAuth = path.indexOf("m/") === 0 || path === "login" || path === "check-email" || path.indexOf("onboarding") === 0;
  window.scrollTo(0, 0);
  // run per-view init if present
  const initKey = ROUTES[path] ? path : (ROUTES[parts.slice(0, -1).join("/") + "/*"] ? parts.slice(0, -1).join("/") + "/*" : null);
  if (initKey && ROUTES[initKey] && ROUTES[initKey].init) ROUTES[initKey].init(app, parts);
}
window.render = render;
window.addEventListener("hashchange", render);
document.addEventListener("DOMContentLoaded", () => { buildLauncher(); render(); });
if (document.readyState !== "loading") { buildLauncher(); render(); }

})();
</script>
